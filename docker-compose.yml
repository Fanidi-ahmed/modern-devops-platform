version: "3.9"

services:

  db:
    image: postgres:16
    container_name: devops-postgres
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  prometheus: 
    image: prom/prometheus
    container_name: devops-prometheus
    volumes:
       - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
       - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: devops-grafana
    ports:
      - "3000:3000"
  
  redis:
    image: redis:7
    container_name: devops-redis
    ports:
      - "6379:6379"  
  
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: devops-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://devops_user:devops_password@db:5432/devops_db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  
  
  