name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U devops_user"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://devops_user:devops_password@localhost:5432/devops_db
        run: |
          pytest app/tests -vv
